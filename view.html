<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member View - Air Allied Mind</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: linear-gradient(0deg, #121212 0%, #1a1a1a 35%, #76b1ba 100%);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            color: white;
            font-family: sans-serif;
        }
        #page-display {
            width: 85%;
            height: 55vh;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            font-size: 18px;
            line-height: 1.6;
            white-space: pre-wrap; /* حفظ فاصله و خطوط */
        }
        .nav-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        button {
            padding: 10px 20px;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div id="page-display">در حال بارگذاری...</div>

    <div class="nav-bar">
        <button onclick="changePage(-1)">BACK</button>
        <span id="page-num">Page: 1</span>
        <button onclick="changePage(1)">NEXT</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBsEwllSPLTPuviM9-DTE0iwZ3vHSzyWrk",
            authDomain: "airalliedmind.firebaseapp.com",
            databaseURL: "https://airalliedmind-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "airalliedmind",
            storageBucket: "airalliedmind.firebasestorage.app",
            appId: "1:565351294890:web:857a9f989bbba3274f6dd3"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentPage = 1;

        const display = document.getElementById('page-display');
        const pageLabel = document.getElementById('page-num');

        // گوش دادن به تغییرات دیتابیس در لحظه (Realtime)
        function listenToPage(page) {
            db.ref('pages/' + page).on('value', (snapshot) => {
                display.innerText = snapshot.val() || "هنوز متنی در این صفحه نوشته نشده است.";
            });
        }

        function changePage(step) {
            // قطع گوش دادن به صفحه قبل
            db.ref('pages/' + currentPage).off();
            
            currentPage += step;
            if (currentPage < 1) currentPage = 1;
            pageLabel.innerText = "Page: " + currentPage;
            listenToPage(currentPage);
        }

        listenToPage(1);
    </script>
</body>
</html>
