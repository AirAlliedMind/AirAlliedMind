<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نمایش محتوا - Air Allied Mind</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

    <style>
        body {
            background: linear-gradient(0deg, #121212 0%, #1a1a1a 35%, #76b1ba 100%);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100dvh; /* هماهنگ با ارتفاع موبایل */
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }
        .header {
            display: flex;
            justify-content: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
        }
        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
        }
        #page-display {
            width: 85%;
            height: 55vh; /* هماهنگ با پنل مدیریت */
            margin: 30px auto;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            font-size: 18px;
            line-height: 1.6;
            white-space: pre-wrap;
            text-align: right; /* راست‌چین برای متن فارسی */
            overflow-y: auto;
        }
        .nav-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        #page-num {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="searchContent()">جست‌وجو (Search)</button>
    </div>

    <div id="page-display">در حال بارگذاری محتوا...</div>

    <div class="nav-bar">
        <button onclick="changePage(-1)">BACK</button>
        <div id="page-num" onclick="goToSpecificPage()">Page: 1</div>
        <button onclick="changePage(1)">NEXT</button>
    </div>

    <script>
        // تنظیمات فایربیس شما
        const firebaseConfig = {
            apiKey: "AIzaSyBsEwllSPLTPuviM9-DTE0iwZ3vHSzyWrk",
            authDomain: "airalliedmind.firebaseapp.com",
            databaseURL: "https://airalliedmind-default-rtdb.asia-southeast1.firebasedatabase.app",

            storageBucket: "airalliedmind.firebasestorage.app",
            appId: "1:565351294890:web:857a9f989bbba3274f6dd3"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentPage = 1;

        const display = document.getElementById('page-display');
        const pageLabel = document.getElementById('page-num');

        // گوش دادن به تغییرات دیتابیس در لحظه
        function listenToPage(page) {
            display.innerText = "در حال خواندن از سرور...";
            db.ref('pages/' + page).on('value', (snapshot) => {
                display.innerText = snapshot.val() || "هنوز محتوایی در این صفحه ثبت نشده است.";
            });
        }

        function changePage(step) {
            db.ref('pages/' + currentPage).off(); // قطع اتصال صفحه قبلی
            currentPage += step;
            if (currentPage < 1) currentPage = 1;
            updateUI();
        }

        function updateUI() {
            pageLabel.innerText = "Page: " + currentPage;
            listenToPage(currentPage);
        }

        // قابلیت پریدن به صفحه دلخواه
        function goToSpecificPage() {
            const target = prompt("شماره صفحه مورد نظر را وارد کنید:", currentPage);
            if (target && !isNaN(target)) {
                db.ref('pages/' + currentPage).off();
                currentPage = parseInt(target);
                updateUI();
            }
        }
