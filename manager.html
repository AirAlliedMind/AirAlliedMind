<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Panel - Air Allied Mind</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            background: linear-gradient(0deg, #121212 0%, #1a1a1a 35%, #76b1ba 100%);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100dvh; /* اصلاح برای موبایل */
            color: white;
            font-family: sans-serif;
            overflow: auto; /* اجازه اسکرول در صورت نیاز */
        }
        .header {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
        }
        button {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
        }
        #page-content {
            width: 90%;
            height: 55vh; /* کوتاه کردن کادر برای باز شدن فضا */
            margin: 20px auto;
            background: rgba(255,255,255,0.05);
            border: none;
            color: white;
            font-size: 18px;
            padding: 15px;
            border-radius: 15px;
            resize: none;
            outline: none;
        }
        .nav-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="downloadPDF()">Download PDF</button>
        <button onclick="location.href='index.html'" style="color: #ff6b6b;">Log Out</button>
    </div>

    <textarea id="page-content" placeholder="متن خود را اینجا بنویسید..."></textarea>

    <div class="nav-bar">
        <button onclick="changePage(-1)">BACK</button>
        <span id="page-num">Page: 1</span>
        <button onclick="changePage(1)">NEXT</button>
    </div>

    <script>
        // تنظیمات فایربیس تو
        const firebaseConfig = {
            apiKey: "AIzaSyBsEwllSPLTPuviM9-DTE0iwZ3vHSzyWrk",
            authDomain: "airalliedmind.firebaseapp.com",
            databaseURL: "https://airalliedmind-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "airalliedmind",
            storageBucket: "airalliedmind.firebasestorage.app",
            appId: "1:565351294890:web:857a9f989bbba3274f6dd3"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentPage = 1;

        const editor = document.getElementById('page-content');
        const pageLabel = document.getElementById('page-num');

        // خوندن متن از دیتابیس موقع لود شدن یا تعویض صفحه
        function loadPage(page) {
            db.ref('pages/' + page).once('value').then((snapshot) => {
                editor.value = snapshot.val() || "";
            });
        }

        // ذخیره خودکار متن در دیتابیس به محض تایپ کردن
        editor.addEventListener('input', () => {
            db.ref('pages/' + currentPage).set(editor.value);
        });

        function changePage(step) {
            currentPage += step;
            if (currentPage < 1) currentPage = 1;
            pageLabel.innerText = "Page: " + currentPage;
            loadPage(currentPage);
        }

        async function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(245, 245, 220); // رنگ کاهی
            doc.rect(0, 0, 210, 297, 'F');
            doc.text(editor.value, 10, 10);
            doc.save(`Page_${currentPage}.pdf`);
        }

        // شروع اولیه
        loadPage(1);
    </script>
</body>
</html>
