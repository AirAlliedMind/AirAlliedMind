<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت - Air Allied Mind</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: linear-gradient(0deg, #121212 0%, #1a1a1a 35%, #76b1ba 100%);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }
        .header {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
        }
        button {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
        }
        #page-content {
            width: 90%;
            height: 55vh;
            margin: 20px auto;
            background: rgba(255,255,255,0.05);
            border: none;
            color: white;
            font-size: 18px;
            padding: 15px;
            border-radius: 15px;
            resize: none;
            outline: none;
            text-align: right; /* راست‌چین برای فارسی */
        }
        .nav-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        /* استایل برای انتخابگر صفحه */
        #page-num {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="searchContent()">Search</button>
        <button onclick="location.href='index.html'" style="color: #ff6b6b;">Log Out</button>
    </div>

    <textarea id="page-content" placeholder="متن خود را اینجا بنویسید..."></textarea>

    <div class="nav-bar">
        <button onclick="changePage(-1)">BACK</button>
        <div id="page-num" onclick="goToSpecificPage()">Page: 1</div>
        <button onclick="changePage(1)">NEXT</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBsEwllSPLTPuviM9-DTE0iwZ3vHSzyWrk",
            authDomain: "airalliedmind.firebaseapp.com",
            databaseURL: "https://airalliedmind-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "airalliedmind",
            storageBucket: "airalliedmind.firebasestorage.app",
            appId: "1:565351294890:web:857a9f989bbba3274f6dd3"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentPage = 1;
        const editor = document.getElementById('page-content');
        const pageLabel = document.getElementById('page-num');

        function loadPage(page) {
            db.ref('pages/' + page).once('value').then((snapshot) => {
                editor.value = snapshot.val() || "";
            });
        }

        editor.addEventListener('input', () => {
            db.ref('pages/' + currentPage).set(editor.value);
        });

        function changePage(step) {
            currentPage += step;
            if (currentPage < 1) currentPage = 1;
            updateUI();
        }

        function updateUI() {
            pageLabel.innerText = "Page: " + currentPage;
            loadPage(currentPage);
        }

        // قابلیت پریدن به صفحه خاص
        function goToSpecificPage() {
            const target = prompt("شماره صفحه را وارد کنید:", currentPage);
            if (target && !isNaN(target)) {
                currentPage = parseInt(target);
                updateUI();
            }
        }

        // قابلیت جست‌وجو در تمام صفحات
        function searchContent() {
            const query = prompt("کلمه مورد نظر برای جست‌وجو:");
            if (!query) return;

            db.ref('pages').once('value').then((snapshot) => {
                const allPages = snapshot.val();
                let found = false;
                for (let p in allPages) {
                    if (allPages[p].includes(query)) {
                        if (confirm(`کلمه در صفحه ${p} پیدا شد. برویم به این صفحه؟`)) {
                            currentPage = parseInt(p);
                            updateUI();
                        }
                        found = true;
                        break;
                    }
                }
                if (!found) alert("کلمه پیدا نشد.");
            });
        }

        loadPage(1);
    </script>
</body>
</html>
