<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        /* تنظیمات پس‌زمینه گرادینت مطابق صفحه اصلی */
        body {
            background: linear-gradient(0deg, #121212 0%, #1a1a1a 35%, #76b1ba 100%);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }

        /* نوار بالایی برای قرار دادن فلش بازگشت */
        .top-bar {
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: flex-start; /* قرارگیری در سمت چپ */
            box-sizing: border-box;
        }

        /* استایل فلش بازگشت */
        .back-arrow {
            text-decoration: none;
            color: white;
            font-size: 28px;
            font-weight: bold;
            opacity: 0.8;
            transition: 0.2s;
        }

        .back-arrow:active {
            opacity: 1;
            transform: translateX(-3px); /* افکت کوچک هنگام لمس */
        }

        /* کانتینر محتوا */
        .container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            text-align: center;
        }

        /* متن راهنما */
        p {
            font-size: 17px;
            margin-bottom: 40px;
            padding: 0 30px;
            line-height: 1.6;
            letter-spacing: 0.5px;
        }

        /* استایل لینک دکمه تلگرام */
        .btn-link {
            text-decoration: none;
            width: 85%;
            max-width: 350px;
            display: block;
        }

        /* دکمه تلگرام با تم Notera */
        .btn {
            background-color: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.6);
            width: 100%;
            padding: 20px;
            text-align: center; /* متن دکمه در مرکز */
            font-size: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:active {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: white;
        }

    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-arrow">&#8592;</a>
    </div>

    <div class="container">
        <p>To contact us, please join our Telegram channel.</p>
        
        <a href="https://t.me/AirAlliedMind" class="btn-link">
            <button class="btn">TELEGRAM CHANNEL</button>
        </a>
    </div>

</body>
</html>
