<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Site</title>
    <style>
        body {
            background: linear-gradient(0deg, #121212 0%, #1a1a1a 35%, #76b1ba 100%);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }

        /* نوار بالایی برای فلش بازگشت */
        .top-bar {
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: flex-start;
            box-sizing: border-box;
        }

        .back-arrow {
            text-decoration: none;
            color: white;
            font-size: 28px;
            font-weight: bold;
            opacity: 0.8;
        }

        /* بخش انیمیشن متن */
        .welcome-animation {
            margin-top: 100px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            gap: 10px;
        }

        .word {
            opacity: 0;
            animation: fadeIn 0.8s forwards;
        }

        .w1 { animation-delay: 0.5s; }
        .w2 { animation-delay: 1.2s; }
        .w3 { animation-delay: 1.9s; }
        .w4 { animation-delay: 2.6s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* بخش دکمه‌ها */
        .button-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 60px;
            opacity: 0;
            animation: showButtons 1s forwards;
            animation-delay: 3.5s;
        }

        @keyframes showButtons {
            to { opacity: 1; }
        }

        .btn-link {
            text-decoration: none;
            width: 85%;
            max-width: 350px;
            margin-bottom: 15px;
        }

        .btn {
            background-color: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            width: 100%;
            padding: 20px;
            text-align: center;
            font-size: 15px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:active {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .tm-symbol {
            font-size: 0.6em;
            vertical-align: super;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-arrow">&#8592;</a>
    </div>

    <div class="welcome-animation">
        <span class="word w1">Air</span>
        <span class="word w2">Allied</span>
        <span class="word w3">Mind</span>
        <span class="word w4"><span class="tm-symbol">&trade;</span></span>
    </div>

    <div class="button-container">
        <a href="writer.html" class="btn-link">
            <button class="btn">MANAGER LOGIN</button>
        </a>

        <a href="view.html" class="btn-link">
            <button class="btn">MEMBER LOGIN</button>
        </a>
    </div>

</body>
</html>
